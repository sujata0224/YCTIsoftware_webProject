<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>

body{
font-family: Arial;
margin:0;
background-image:url("img2.jpg");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.contact-box{
background:rgba(255,255,255,0.95);
width:400px;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
border-top:5px solid #7b3fe4;
}

h2{
text-align:center;
color:#7b3fe4;
margin-bottom:20px;
}

.input-box{
margin-bottom:15px;
}

.input-box label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

.input-box input,
.input-box textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
resize:none;
height:80px;
}

button{
width:100%;
padding:10px;
background:#7b3fe4;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5e2ec4;
}

</style>
</head>

<body>

<div class="contact-box">

<h2>Contact Us</h2>

<form>

<div class="input-box">
<label>Name</label>
<input type="text" placeholder="Enter your name">
</div>

<div class="input-box">
<label>Email</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="input-box">
<label>Subject</label>
<input type="text" placeholder="Enter subject">
</div>

<div class="input-box">
<label>Message</label>
<textarea placeholder="Write your message"></textarea>
</div>

<button type="submit">Send Message</button>

</form>

</div>

</body>
</html>
